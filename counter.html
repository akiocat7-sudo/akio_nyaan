<!-- counter.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シールカウンター</title>
  <link rel="stylesheet" href="css/counter.css">
</head>
<body>
  <div class="container">
    <h2 class="title" id="month-title">今月のシール枚数</h2>
    <h3 class="subtitle">シールカウンター</h3>
    <h1 id="total">0</h1>

    <div class="single-button-area">
      <button class="main-btn" id="add-btn">シールを1枚貼る</button>
    </div>

    <div id="sticker-effect-area"></div>

    <div class="bottom-buttons">
      <button class="undo-btn" id="undo-btn">シールを剥がす</button>
      <button class="reset-btn" id="reset-btn">リセット</button>
    </div>

<div id="lists-wrapper">
  <div class="list-block">
    <h3>履歴</h3>
    <ul id="history"></ul>
  </div>
    <div class="month-close-area">
      <button class="month-close-btn" id="close-btn">今月のシール枚数を確定する</button>
    </div>

  <div class="list-block">
    <h3>過去12ヶ月</h3>
    <ul id="past"></ul>
  </div>
</div>
  </div>

  <!-- ★ counter.jsをtype="module"で読み込む（これだけでOK） -->
  <script type="module" src="js/counter.js"></script>
</body>
</html>
