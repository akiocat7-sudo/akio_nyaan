<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カウンター</title>
  <link rel="stylesheet" href="css/counter.css">
</head>
<body>

  <div class="container">
    <h1 id="total">0</h1>

    <div class="single-button-area">
      <button class="main-btn" onclick="addNumber(1)">シール1枚貼る</button>
    </div>

    <div class="bottom-buttons">
      <button class="undo-btn" onclick="undo()">ひとつ前に戻る</button>
      <button class="reset-btn" onclick="resetTotal()">リセット</button>
    </div>
  </div>

  <script src="js/counter.js"></script>
</body>
</html>
