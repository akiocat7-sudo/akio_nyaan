<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Select</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="container">
    <h2 class="title">ユーザーを選択</h2>

    <div class="user-grid">
      <div class="user-card" onclick="loginAs('user1')">
        <p>ユーザー1</p>
      </div>

      <div class="user-card" onclick="loginAs('user2')">
        <p>ユーザー2</p>
      </div>

      <div class="user-card" onclick="loginAs('user3')">
        <p>ユーザー3</p>
      </div>

      <div class="user-card" onclick="loginAs('user4')">
        <p>ユーザー4</p>
      </div>
    </div>

    <p id="message"></p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
